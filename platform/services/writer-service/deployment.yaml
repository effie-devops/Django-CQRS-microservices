apiVersion: v1
kind: ServiceAccount
metadata:
  name: writer-service-sa
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::377106666111:role/django-api-uat-secrets-access-role"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: writer-service
  namespace: default
  labels:
    app: writer-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: writer-service
  template:
    metadata:
      labels:
        app: writer-service
    spec:
      serviceAccountName: writer-service-sa
      containers:
        - name: writer-service
          image: 377106666111.dkr.ecr.us-east-1.amazonaws.com/writer-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: writer-service-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: writer-service-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: writer-service-db-secret
                  key: DB_PASSWORD
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: writer-service-db-secret
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: writer-service-db-secret
                  key: DB_NAME
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: writer-service-db-secret
                  key: DB_PORT
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: writer-service-secrets
