apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  role: django-api-uat-karpenter-node-role
  amiSelectorTerms:
    - alias: al2023@latest
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: django-api-uat-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: django-api-uat-cluster
  tags:
    Name: django-api-uat-karpenter-node
